<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackd — App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c0c0c;
      color: #fff;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOP NAV */
    .top-nav {
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid #1e1e1e;
      background: #0c0c0c;
      flex-shrink: 0;
      gap: 8px;
    }

    .nav-logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #fff;
      margin-right: 24px;
    }

    .nav-logo span { color: #E9A84C; }

    .nav-tab {
      background: transparent;
      color: #555;
      border: none;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .nav-tab:hover { color: #fff; background: #1a1a1a; }
    .nav-tab.active { color: #fff; background: #1a1a1a; }

    /* LAYOUT */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      border-right: 1px solid #1e1e1e;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      text-align: left;
      width: 100%;
    }

    .sidebar-item:hover { color: #fff; background: #1a1a1a; }
    .sidebar-item.active { color: #fff; background: #1a1a1a; }

    .sidebar-icon { font-size: 16px; }

    .streak-box {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 12px;
      margin: 8px 0;
      text-align: center;
    }

    .streak-number {
      font-size: 32px;
      font-weight: 800;
      color: #E9A84C;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .streak-label {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .sidebar-divider {
      height: 1px;
      background: #1e1e1e;
      margin: 8px 0;
    }

    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* MAIN CONTENT */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      display: flex;
      flex-direction: column;
    }

    /* DAILY CHECK-IN */
    .checkin-screen {
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }

    .screen-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #E9A84C;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: block;
    }

    .screen-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .screen-sub {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn-primary {
      background: #E9A84C;
      color: #0c0c0c;
      border: none;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
      display: inline-block;
    }

    .btn-primary:hover { opacity: 0.88; }

    .btn-ghost {
      background: transparent;
      color: #555;
      border: 1px solid #222;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      display: inline-block;
      margin-top: 10px;
      width: 100%;
    }

    .btn-ghost:hover { color: #fff; border-color: #444; }

    textarea {
      width: 100%;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      padding: 14px 16px;
      margin-bottom: 12px;
      resize: none;
      height: 100px;
      outline: none;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #E9A84C; }
    textarea::placeholder { color: #333; }

    .question-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .coach-box {
      background: #111;
      border: 1px solid #1e1e1e;
      border-left: 3px solid #E9A84C;
      border-radius: 10px;
      padding: 20px;
      font-size: 15px;
      line-height: 1.75;
      color: #ccc;
      margin-bottom: 24px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid #222;
      border-top-color: #E9A84C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* PROGRESS BAR */
    .progress-bar {
      width: 100%;
      height: 2px;
      background: #1c1c1c;
      border-radius: 99px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-fill {
      height: 2px;
      background: #E9A84C;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    /* CHAT */
    .chat-screen {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    .chat-header {
      margin-bottom: 24px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 24px;
    }

    .chat-message {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .chat-message.user { flex-direction: row-reverse; }

    .chat-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .chat-message.user .chat-avatar {
      background: #E9A84C;
      color: #0c0c0c;
      font-weight: 700;
      font-size: 12px;
    }

    .chat-bubble {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.7;
      color: #ccc;
      max-width: 80%;
    }

    .chat-message.user .chat-bubble {
      background: #1a1a1a;
      border-color: #2a2a2a;
      color: #fff;
    }

    .chat-input-area {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding-top: 16px;
      border-top: 1px solid #1e1e1e;
    }

    .chat-input {
      flex: 1;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      padding: 12px 16px;
      resize: none;
      height: 48px;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    .chat-input:focus { border-color: #E9A84C; }
    .chat-input::placeholder { color: #333; }

    .chat-send {
      background: #E9A84C;
      color: #0c0c0c;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .chat-send:hover { opacity: 0.88; }

    /* PROGRESS TRACKER */
    .progress-screen {
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-number {
      font-size: 36px;
      font-weight: 800;
      color: #E9A84C;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 12px;
      color: #555;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .week-grid {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .week-title {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .week-dots {
      display: flex;
      gap: 8px;
    }

    .week-day {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .week-dot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #1e1e1e;
    }

    .week-dot.done { background: #E9A84C; }
    .week-dot.today { background: #1e1e1e; border: 2px solid #E9A84C; }

    .week-day-label {
      font-size: 11px;
      color: #444;
      font-weight: 600;
    }

    .history-list {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
    }

    .history-item {
      padding: 16px 20px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-item:last-child { border-bottom: none; }

    .history-date {
      font-size: 13px;
      color: #555;
      font-weight: 500;
    }

    .history-badge {
      background: rgba(233,168,76,0.1);
      color: #E9A84C;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid rgba(233,168,76,0.2);
    }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <div class="top-nav">
    <div class="nav-logo">Stack<span>d</span></div>
    <button class="nav-tab active" onclick="switchTab('checkin', this)">Daily Check-in</button>
    <button class="nav-tab" onclick="switchTab('coach', this)">24/7 Coach</button>
    <button class="nav-tab" onclick="switchTab('progress', this)">Progress Tracker</button>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="sidebar-item active" onclick="sidebarClick(this)">
        <span class="sidebar-icon">📋</span> Your Check-ins
      </button>

      <div class="streak-box">
        <div class="streak-number" id="streakNumber">0</div>
        <div class="streak-label">Day Streak</div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-bottom">
        <button class="sidebar-item" onclick="sidebarClick(this)">
          <span class="sidebar-icon">⚠️</span> Report Problem
        </button>
        <button class="sidebar-item" onclick="sidebarClick(this)">
          <span class="sidebar-icon">⚙️</span> Settings
        </button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main" id="mainContent">
    </div>

  </div>

  <script>
    let answers = {};
    let streak = parseInt(localStorage.getItem('stackd_streak') || '0');
    let chatHistory = [];
    const API_URL = 'https://stackd-coral-two.vercel.app/api/coach';

    document.getElementById('streakNumber').textContent = streak;

    function switchTab(tab, el) {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      if (tab === 'checkin') showCheckinHome();
      if (tab === 'coach') showCoach();
      if (tab === 'progress') showProgress();
    }

    function sidebarClick(el) {
      document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    }

    function render(html) {
      document.getElementById('mainContent').innerHTML = html;
    }

    // ── DAILY CHECK-IN ──
    function showCheckinHome() {
      render(`
        <div class="checkin-screen">
          <span class="screen-tag">Daily Check-in</span>
          <h1 class="screen-title">Daily check-in</h1>
          <p class="screen-sub">Your daily progress summarised based on 3 questions. Show up every day and stack your wins.</p>
          <button class="btn-primary" onclick="startCheckin()">Start daily check-in</button>
        </div>
      `);
    }

    const checkinQuestions = [
      { key: 'yesterday', label: 'What did you do yesterday?', ph: 'Yesterday I...' },
      { key: 'blocked', label: 'What is blocking you right now?', ph: 'I am blocked by...' },
      { key: 'today', label: 'What is your one thing for today?', ph: 'Today I will...' }
    ];

    let checkinAnswers = {};

    function startCheckin() {
      checkinAnswers = {};
      showCheckinQuestion(0);
    }

    function showCheckinQuestion(i) {
      const q = checkinQuestions[i];
      const pct = (i / checkinQuestions.length) * 100;
      render(`
        <div class="checkin-screen">
          <div class="progress-bar">
            <div class="progress-fill" id="pb" style="width:0%"></div>
          </div>
          <span class="screen-tag">Question ${i+1} of ${checkinQuestions.length}</span>
          <h1 class="screen-title">${q.label}</h1>
          <textarea id="cans" placeholder="${q.ph}"></textarea>
          <button class="btn-primary" onclick="saveCheckinAnswer(${i})" style="width:100%">Continue</button>
          ${i > 0 ? `<button class="btn-ghost" onclick="showCheckinQuestion(${i-1})">Back</button>` : ''}
        </div>
      `);
      setTimeout(() => { document.getElementById('pb').style.width = pct + '%'; }, 50);
    }

    function saveCheckinAnswer(i) {
      const val = document.getElementById('cans').value.trim();
      if (!val) return;
      checkinAnswers[checkinQuestions[i].key] = val;
      if (i < checkinQuestions.length - 1) {
        showCheckinQuestion(i + 1);
      } else {
        submitCheckin();
      }
    }

    async function submitCheckin() {
      render(`
        <div class="checkin-screen" style="text-align:center; padding-top:60px;">
          <div class="spinner"></div>
          <h1 class="screen-title">Your coach is thinking...</h1>
          <p class="screen-sub">Give it a few seconds.</p>
        </div>
      `);

      const context = `Project: ${answers.project || 'Not set'}\nStage: ${answers.stage || 'Not set'}\nObstacle: ${answers.obstacle || 'Not set'}\nGoal: ${answers.goal || 'Not set'}\nDaily time: ${answers.time || 'Not set'}`;
      const checkin = `Yesterday: ${checkinAnswers.yesterday}\nBlocked by: ${checkinAnswers.blocked}\nOne thing today: ${checkinAnswers.today}`;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ context, checkin })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);

        streak++;
        localStorage.setItem('stackd_streak', streak);
        document.getElementById('streakNumber').textContent = streak;

        render(`
          <div class="checkin-screen">
            <span class="screen-tag">Your coach says</span>
            <h1 class="screen-title">Here is your coaching.</h1>
            <div class="coach-box">${formatResponse(data.reply)}</div>
            <button class="btn-primary" onclick="startCheckin()" style="width:100%">New check-in</button>
            <button class="btn-ghost" onclick="showCheckinHome()">Back to home</button>
          </div>
        `);
      } catch(e) {
        render(`
          <div class="checkin-screen">
            <h1 class="screen-title">Something went wrong.</h1>
            <p class="screen-sub">${e.message}</p>
            <button class="btn-primary" onclick="startCheckin()">Try again</button>
          </div>
        `);
      }
    }

    function formatResponse(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^/, '<p>')
        .replace(/$/, '</p>');
    }

    // ── 24/7 COACH ──
    function showCoach() {
      chatHistory = [];
      render(`
        <div class="chat-screen">
          <div class="chat-header">
            <span class="screen-tag">24/7 Coach</span>
            <h1 class="screen-title">Ask your mentor anything.</h1>
          </div>
          <div class="chat-messages" id="chatMessages">
            <div class="chat-message">
              <div class="chat-avatar">🤖</div>
              <div class="chat-bubble">Hey! I know your project and goals. Ask me anything — stuck on a decision, need advice, or just want to think something through. I am here.</div>
            </div>
          </div>
          <div class="chat-input-area">
            <textarea class="chat-input" id="chatInput" placeholder="Ask your coach anything..." onkeydown="handleChatKey(event)"></textarea>
            <button class="chat-send" onclick="sendChat()">↑</button>
          </div>
        </div>
      `);
    }

    function handleChatKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';

      chatHistory.push({ role: 'user', content: msg });

      const messages = document.getElementById('chatMessages');
      messages.innerHTML += `
        <div class="chat-message user">
          <div class="chat-avatar">Y</div>
          <div class="chat-bubble">${msg}</div>
        </div>
      `;

      messages.innerHTML += `
        <div class="chat-message" id="typingIndicator">
          <div class="chat-avatar">🤖</div>
          <div class="chat-bubble" style="color:#444;">Thinking...</div>
        </div>
      `;
      messages.scrollTop = messages.scrollHeight;

      const context = `Project: ${answers.project || 'Not set'}\nGoal: ${answers.goal || 'Not set'}\nObstacle: ${answers.obstacle || 'Not set'}`;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            context,
            checkin: msg,
            systemOverride: `You are a 24/7 mentor for a young entrepreneur. You know their project context: ${context}. Be direct, specific, and conversational. Keep responses under 100 words unless they need more detail. No fluff.`
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        chatHistory.push({ role: 'assistant', content: data.reply });

        document.getElementById('typingIndicator').outerHTML = `
          <div class="chat-message">
            <div class="chat-avatar">🤖</div>
            <div class="chat-bubble">${formatResponse(data.reply)}</div>
          </div>
        `;
        messages.scrollTop = messages.scrollHeight;

      } catch(e) {
        document.getElementById('typingIndicator').outerHTML = `
          <div class="chat-message">
            <div class="chat-avatar">🤖</div>
            <div class="chat-bubble" style="color:#c0392b;">Something went wrong. Try again.</div>
          </div>
        `;
      }
    }

    // ── PROGRESS TRACKER ──
    function showProgress() {
      const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const daysHtml = days.map((d, i) => `
        <div class="week-day">
          <div class="week-dot ${i < streak % 7 ? 'done' : i === streak % 7 ? 'today' : ''}"></div>
          <span class="week-day-label">${d}</span>
        </div>
      `).join('');

      render(`
        <div class="progress-screen">
          <span class="screen-tag">Progress Tracker</span>
          <h1 class="screen-title" style="margin-bottom:24px;">Your progress.</h1>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-number">${streak}</div>
              <div class="stat-label">Day Streak</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${streak}</div>
              <div class="stat-label">Total Check-ins</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${streak > 0 ? Math.round((streak / 7) * 100) : 0}%</div>
              <div class="stat-label">This Week</div>
            </div>
          </div>

          <div class="week-grid">
            <div class="week-title">This week</div>
            <div class="week-dots">${daysHtml}</div>
          </div>

          <div class="history-list">
            <div class="history-item">
              <span class="history-date">Today</span>
              <span class="history-badge">✓ Completed</span>
            </div>
            <div class="history-item">
              <span class="history-date">Yesterday</span>
              <span class="history-badge">✓ Completed</span>
            </div>
            <div class="history-item">
              <span class="history-date">2 days ago</span>
              <span class="history-badge">✓ Completed</span>
            </div>
          </div>
        </div>
      `);
    }

    // Init
    showCheckinHome();
  </script>
</body>
</html>
