<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackd — App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c0c0c;
      color: #fff;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* AUTH SCREENS */
    .auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: linear-gradient(to top, rgba(233,168,76,0.3) 0%, rgba(12,12,12,0) 100%);
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 40px;
    }

    .auth-logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #fff;
      margin-bottom: 32px;
      display: block;
      text-align: center;
    }

    .auth-logo span { color: #E9A84C; }

    .auth-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .auth-sub {
      font-size: 14px;
      color: #555;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .auth-label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .auth-input {
      width: 100%;
      background: #0c0c0c;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      padding: 12px 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .auth-input:focus { border-color: #E9A84C; }
    .auth-input::placeholder { color: #333; }

    .auth-btn {
      width: 100%;
      background: #E9A84C;
      color: #0c0c0c;
      border: none;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
      margin-top: 8px;
    }

    .auth-btn:hover { opacity: 0.88; }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }

    .auth-switch a {
      color: #E9A84C;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
    }

    .auth-error {
      background: rgba(192,57,43,0.1);
      border: 1px solid rgba(192,57,43,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #e74c3c;
      margin-bottom: 16px;
      display: none;
    }

    /* TOP NAV */
    .top-nav {
      display: flex;
      align-items: center;
      padding: 0 32px;
      height: 64px;
      border-bottom: 1px solid #1e1e1e;
      background: #0c0c0c;
      flex-shrink: 0;
      gap: 4px;
    }

    .nav-logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #fff;
      margin-right: 32px;
    }

    .nav-logo span { color: #E9A84C; }

    .nav-tab {
      background: transparent;
      color: #555;
      border: none;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .nav-tab:hover { color: #fff; background: #1a1a1a; }
    .nav-tab.active { color: #fff; background: #1a1a1a; }

    .nav-signout {
      margin-left: auto;
      background: transparent;
      color: #555;
      border: 1px solid #222;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .nav-signout:hover { color: #fff; border-color: #444; }

    /* LAYOUT */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      border-right: 1px solid #1e1e1e;
      padding: 24px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      text-align: left;
      width: 100%;
    }

    .sidebar-item:hover { color: #fff; background: #1a1a1a; }
    .sidebar-item.active { color: #fff; background: #1a1a1a; }
    .sidebar-icon { font-size: 17px; display: flex; align-items: center; }

    .streak-box {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      margin: 10px 0;
      text-align: center;
    }

    .streak-number {
      font-size: 40px;
      font-weight: 800;
      color: #E9A84C;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .streak-label {
      font-size: 11px;
      color: #555;
      margin-top: 6px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sidebar-divider { height: 1px; background: #1e1e1e; margin: 10px 0; }

    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* MAIN */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* CHECKIN SCREEN */
    .checkin-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 60px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .screen-tag {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #E9A84C;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: block;
    }

    .screen-title {
      font-size: 96px;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 20px;
      line-height: 1;
    }

    .screen-title.small { font-size: 58px; }

    .screen-sub {
      font-size: 22px;
      color: #555;
      line-height: 1.7;
      margin-bottom: 52px;
      max-width: 560px;
    }

    .btn-primary {
      background: #E9A84C;
      color: #0c0c0c;
      border: none;
      padding: 20px 40px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
      display: inline-block;
      width: 100%;
    }

    .btn-primary:hover { opacity: 0.88; }

    .btn-ghost {
      background: transparent;
      color: #555;
      border: 1px solid #222;
      padding: 16px 40px;
      font-size: 15px;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      display: block;
      margin-top: 10px;
      width: 100%;
      text-align: center;
    }

    .btn-ghost:hover { color: #fff; border-color: #444; }

    textarea {
      width: 100%;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      padding: 16px;
      margin-bottom: 16px;
      resize: none;
      height: 110px;
      outline: none;
      line-height: 1.6;
      transition: border-color 0.2s;
      text-align: left;
    }

    textarea:focus { border-color: #E9A84C; }
    textarea::placeholder { color: #333; }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: #1c1c1c;
      border-radius: 99px;
      margin-bottom: 40px;
      overflow: hidden;
    }

    .progress-fill {
      height: 2px;
      background: #E9A84C;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .coach-box {
      background: #111;
      border: 1px solid #1e1e1e;
      border-left: 3px solid #E9A84C;
      border-radius: 10px;
      padding: 24px;
      font-size: 16px;
      line-height: 1.8;
      color: #ccc;
      margin-bottom: 28px;
      text-align: left;
      width: 100%;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #222;
      border-top-color: #E9A84C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* CHAT */
    .chat-screen {
      flex: 1;
      display: flex;
      padding: 0 80px;
    }

    .chat-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #1e1e1e;
      border-right: 1px solid #1e1e1e;
      padding: 40px 48px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .chat-header { margin-bottom: 28px; flex-shrink: 0; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-bottom: 24px;
    }

    .chat-message { display: flex; gap: 14px; align-items: flex-start; }
    .chat-message.user { flex-direction: row-reverse; }

    .chat-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .chat-message.user .chat-avatar {
      background: #E9A84C;
      color: #0c0c0c;
      font-weight: 800;
      font-size: 13px;
    }

    .chat-bubble {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      line-height: 1.7;
      color: #ccc;
      max-width: 75%;
    }

    .chat-message.user .chat-bubble {
      background: #1a1a1a;
      border-color: #2a2a2a;
      color: #fff;
    }

    .chat-input-area {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      padding-top: 20px;
      border-top: 1px solid #1e1e1e;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      padding: 14px 18px;
      resize: none;
      height: 52px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus { border-color: #E9A84C; }
    .chat-input::placeholder { color: #333; }

    .chat-send {
      background: #E9A84C;
      color: #0c0c0c;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 700;
      transition: opacity 0.2s;
    }

    .chat-send:hover { opacity: 0.88; }

    /* PROGRESS */
    .progress-screen {
      flex: 1;
      padding: 48px 60px;
      overflow-y: auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: #E9A84C; }

    .stat-number {
      font-size: 56px;
      font-weight: 800;
      color: #E9A84C;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 10px;
    }

    .stat-label {
      font-size: 13px;
      color: #555;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-block {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 20px;
    }

    .block-title {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .week-dots { display: flex; gap: 12px; }

    .week-day {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .week-dot {
      width: 100%;
      height: 48px;
      border-radius: 10px;
      background: #1a1a1a;
    }

    .week-dot.done { background: #E9A84C; }
    .week-dot.today { background: #1a1a1a; border: 2px solid #E9A84C; }

    .week-day-label { font-size: 12px; color: #444; font-weight: 600; }

    .history-item {
      padding: 18px 0;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-item:last-child { border-bottom: none; }
    .history-date { font-size: 15px; color: #888; font-weight: 500; }

    .history-badge {
      background: rgba(233,168,76,0.1);
      color: #E9A84C;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid rgba(233,168,76,0.2);
    }
          [data-theme="light"] {
  background: #ffffff;

}

[data-theme="light"] .top-nav,
[data-theme="light"] .sidebar,
[data-theme="light"] .main {
  background: #ffffff;
}

[data-theme="light"] .sidebar-item { color: #888; }
[data-theme="light"] .sidebar-item:hover,

[data-theme="light"] .streak-box,

}

[data-theme="light"] .screen-title,

[data-theme="light"] .nav-logo { color: #0c0c0c; }
[data-theme="light"] .coach-box { color: #0c0c0c; }
[data-theme="light"] .chat-bubble { color: #0c0c0c; }
[data-theme="light"] .screen-sub { color: #666; }

[data-theme="light"] .nav-tab { color: #888; }
[data-theme="light"] .nav-tab.active,
[data-theme="light"] .nav-tab:hover { background: #f0f0f0; color: #0c0c0c; }

[data-theme="light"] textarea,
[data-theme="light"] .chat-input {
  background: #f5f5f5;
  border-color: #e0e0e0;
  color: #0c0c0c;
}

[data-theme="light"] .top-nav,
[data-theme="light"] .sidebar {
  border-color: #e0e0e0;
}
    @media (max-width: 768px) {
  body {
    overflow: auto;
  }

  .top-nav {
    padding: 0 16px;
    height: auto;
    flex-wrap: wrap;
    gap: 4px;
    padding: 12px 16px;
  }

  .nav-logo {
    font-size: 20px;
    margin-right: auto;
  }

  .nav-tab {
    font-size: 12px;
    padding: 6px 10px;
  }

  .nav-signout {
    font-size: 12px;
    padding: 6px 10px;
  }

  .layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid #1e1e1e;
    padding: 12px 16px;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
  }

  .sidebar-bottom {
    margin-top: 0;
    flex-direction: row;
    gap: 8px;
  }

  .sidebar-divider { display: none; }

  .streak-box {
    padding: 8px 12px;
    margin: 0;
    white-space: nowrap;
  }

  .streak-number { font-size: 20px; }
  .streak-label { font-size: 9px; }

  .sidebar-item {
    padding: 8px 10px;
    font-size: 12px;
    white-space: nowrap;
  }

  .checkin-screen {
    padding: 40px 24px;
  }

  .screen-title { font-size: 48px; }
  .screen-title.small { font-size: 32px; }
  .screen-sub { font-size: 16px; margin-bottom: 32px; }

  .chat-screen {
    padding: 0;
  }

  .chat-inner {
    padding: 20px 16px;
    border-left: none;
    border-right: none;
  }

  .progress-screen {
    padding: 24px 16px;
  }

  .stats-grid {
    grid-template-columns: 1fr;
  }

  .auth-box {
    padding: 24px 20px;
  }
  </style>
</head>
<body id="appBody">

<script>
  const SUPABASE_URL = 'https://jknxrszxpjiznphjkfbk.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imprbnhyc3p4cGppem5waGprZmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NDk3NzMsImV4cCI6MjEwMDAyNTc3M30.jp0l_S99XqzBb4SnYeRCFZtWSdLo6eyQEWna7prs2Vw';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const API_URL = 'https://stackd-coral-two.vercel.app/api/coach';

  let currentUser = null;
  let userProfile = null;
  let streak = 0;
  let checkinAnswers = {};

  async function init() {
    const savedTheme = localStorage.getItem('stackd_theme');
    if (savedTheme === 'light') {
      document.body.setAttribute('data-theme', 'light');
      document.body.style.background = '#ffffff';
      document.body.style.color = '#0c0c0c';
    }
    const stored = localStorage.getItem('stackd_user');
    if (stored) {
      currentUser = JSON.parse(stored);
      const { data } = await supabaseClient
        .from('users')
        .select('*')
        .eq('id', currentUser.id)
        .single();
      if (data) {
        userProfile = data;
        streak = data.streak || 0;
        if (!data.project) {
          showOnboarding();
        } else {
          showApp();
        }
        return;
      }
    }
    showAuth('signup');
  }

  function showAuth(mode) {
    document.getElementById('appBody').innerHTML = `

        <div class="auth-box">
          <span class="auth-logo">Stack<span>d</span></span>
          ${mode === 'signup' ? `

            <div class="auth-error" id="authError"></div>
            <label class="auth-label">Email</label>
            <input type="email" class="auth-input" id="authEmail" placeholder="you@example.com">
            <label class="auth-label">Password</label>
            <input type="password" class="auth-input" id="authPassword" placeholder="Min 6 characters">
            <button class="auth-btn" onclick="signUp()">Create account</button>
            <div class="auth-switch">Already have an account? <a onclick="showAuth('signin')">Sign in</a>
            <div style="text-align:center; margin-top:16px; padding-top:16px; border-top:1px solid #1e1e1e;">
  <a href="index.html" style="color:#555; font-size:13px; text-decoration:none;">← Back to home</a>
</div>
          ` : `
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-sub">Sign in to continue building.</p>
            <div class="auth-error" id="authError"></div>
            <label class="auth-label">Email</label>
            <input type="email" class="auth-input" id="authEmail" placeholder="you@example.com">
            <label class="auth-label">Password</label>
            <input type="password" class="auth-input" id="authPassword" placeholder="Your password">
            <button class="auth-btn" onclick="signIn()">Sign in</button>
            <div style="text-align:center; margin-top:12px;">
  <a onclick="showForgotPassword()" style="color:#555; font-size:13px; cursor:pointer;">Forgot password?</a>
  <div style="text-align:center; margin-top:16px; padding-top:16px; border-top:1px solid #1e1e1e;">
  <a href="index.html" style="color:#555; font-size:13px; text-decoration:none;">← Back to home</a>
</div>
</div>
            <div class="auth-switch">No account yet? <a onclick="showAuth('signup')">Sign up free</a></div>
          `}
        </div>
    `;
  }
function showForgotPassword() {
    document.getElementById('appBody').innerHTML = `
      <div class="auth-screen">
        <div class="auth-box">
          <span class="auth-logo">Stack<span>d</span></span>

async function resetPassword() {
    const email = document.getElementById('resetEmail').value.trim();
    const password = document.getElementById('resetPassword').value.trim();
    const confirm = document.getElementById('resetConfirm').value.trim();
    const errorEl = document.getElementById('resetError');

    if (!email || !password || !confirm) {
      errorEl.style.display = 'block';
      errorEl.textContent = 'Please fill in all fields.';
      return;
    }

    if (password.length < 6) {
      errorEl.style.display = 'block';
      errorEl.textContent = 'Password must be at least 6 characters.';
      return;
    }

    if (password !== confirm) {
      errorEl.style.display = 'block';
      errorEl.textContent = 'Passwords do not match.';
      return;
    }

    const { data, error } = await supabaseClient
      .from('users')
      .select('id')
      .eq('email', email)
      .single();

    if (error || !data) {
      errorEl.style.display = 'block';
      errorEl.textContent = 'No account found with that email.';
      return;
    }

    const { error: updateError } = await supabaseClient
      .from('users')
      .update({ user_password: password })
      .eq('email', email);

    if (updateError) {
      errorEl.style.display = 'block';
      errorEl.textContent = 'Something went wrong. Try again.';
      return;
    }

    document.getElementById('appBody').innerHTML = `
      <div class="auth-screen">
        <div class="auth-box">
          <span class="auth-logo">Stack<span>d</span></span>

          <button class="auth-btn" onclick="showAuth('signin')">Go to sign in</button>
        </div>
      </div>
    `;
  }

      msg.textContent = 'Password updated successfully.';
    }
  }

  async function deleteAccount() {
    const confirmed = window.confirm('Are you sure you want to delete your account? This cannot be undone.');
    if (!confirmed) return;
    await supabaseClient
      .from('users')
      .delete()
      .eq('id', currentUser.id);
    localStorage.removeItem('stackd_user');
    currentUser = null;
    userProfile = null;
    showAuth('signup');
  }

  function render(html) {
    document.getElementById('mainContent').innerHTML = html;
  }

  function showCheckinHome() {
    render(`
      <div class="checkin-screen">
        <span class="screen-tag">Daily Check-in</span>
        <h1 class="screen-title">Daily check-in</h1>
        <p class="screen-sub">Your daily progress summarised based on 3 questions. Show up every day and stack your wins.</p>
        <button class="btn-primary" onclick="startCheckin()">Start daily check-in</button>
      </div>
    `);
  }

  const checkinQuestions = [
    { key: 'yesterday', label: 'What did you do yesterday?', ph: 'Yesterday I...' },
    { key: 'blocked', label: 'What is blocking you right now?', ph: 'I am blocked by...' },
    { key: 'today', label: 'What is your one thing for today?', ph: 'Today I will...' }
  ];

  function startCheckin() {
    const lastCheckin = userProfile.last_checkin;
    const today = new Date().toDateString();
    if (lastCheckin === today) {
      render(`
        <div class="checkin-screen">
          <span class="screen-tag">Daily Check-in</span>
          <h1 class="screen-title small">Already done today.</h1>
          <p class="screen-sub">You have completed your check-in for today. Come back tomorrow and keep the streak going.</p>
          <button class="btn-primary" onclick="showCheckinHome()">Back to home</button>
        </div>
      `);
      return;
    }
    checkinAnswers = {};
    showCheckinQuestion(0);
  }

  function showCheckinQuestion(i) {
    const q = checkinQuestions[i];
    const pct = (i / checkinQuestions.length) * 100;
    render(`
      <div class="checkin-screen">
        <div class="progress-bar" style="width:100%">
          <div class="progress-fill" id="pb" style="width:0%"></div>
        </div>
        <span class="screen-tag">Question ${i+1} of ${checkinQuestions.length}</span>
        <h1 class="screen-title small">${q.label}</h1>
        <textarea id="cans" spellcheck="false" placeholder="${q.ph}"></textarea>
        <button class="btn-primary" onclick="saveCheckinAnswer(${i})">Continue</button>
        ${i > 0 ? `<button class="btn-ghost" onclick="showCheckinQuestion(${i-1})">Back</button>` : ''}
      </div>
    `);
    setTimeout(() => { document.getElementById('pb').style.width = pct + '%'; }, 50);
  }

  function saveCheckinAnswer(i) {
    const val = document.getElementById('cans').value.trim();
    if (!val) return;
    checkinAnswers[checkinQuestions[i].key] = val;
    if (i < checkinQuestions.length - 1) {
      showCheckinQuestion(i + 1);
    } else {
      submitCheckin();
    }
  }

  async function submitCheckin() {
    render(`
      <div class="checkin-screen">
        <div class="spinner"></div>
        <h1 class="screen-title small">Your coach is thinking...</h1>
        <p class="screen-sub">Give it a few seconds.</p>
      </div>
    `);
    const context = `Project: ${userProfile.project}\nGoal: ${userProfile.goal}\nObstacle: ${userProfile.obstacle}`;
    const checkin = `Yesterday: ${checkinAnswers.yesterday}\nBlocked by: ${checkinAnswers.blocked}\nOne thing today: ${checkinAnswers.today}`;
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ context, checkin })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error);
      streak++;
      const today = new Date().toDateString();
      await supabaseClient
        .from('users')
        .update({ streak, last_checkin: today })
        .eq('id', currentUser.id);
      await supabaseClient
        .from('checkins')
        .insert([{
          user_id: currentUser.id,
          yesterday: checkinAnswers.yesterday,
          blocked: checkinAnswers.blocked,
          today: checkinAnswers.today,
          coach_response: data.reply
        }]);
      userProfile.streak = streak;
      userProfile.last_checkin = today;
      localStorage.setItem('stackd_user', JSON.stringify(userProfile));
      document.getElementById('streakNumber').textContent = streak;
      render(`
        <div class="checkin-screen">
          <span class="screen-tag">Your coach says</span>
          <h1 class="screen-title small">Here is your coaching.</h1>
          <div class="coach-box">${formatResponse(data.reply)}</div>
          <button class="btn-primary" onclick="startCheckin()">New check-in</button>
          <button class="btn-ghost" onclick="showCheckinHome()">Back to home</button>
        </div>
      `);
    } catch(e) {
      render(`
        <div class="checkin-screen">
          <h1 class="screen-title small">Something went wrong.</h1>
          <p class="screen-sub">${e.message}</p>
          <button class="btn-primary" onclick="startCheckin()">Try again</button>
        </div>
      `);
    }
  }

  function formatResponse(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>')
      .replace(/$/, '</p>');
  }

  function showCoach() {
    render(`
      <div class="chat-screen">
        <div class="chat-inner">
          <div class="chat-header">
            <span class="screen-tag">24/7 Coach</span>
            <h1 class="screen-title" style="font-size:32px;">Ask your mentor anything.</h1>
          </div>
          <div class="chat-messages" id="chatMessages">
            <div class="chat-message">
              <div class="chat-avatar" style="background:#fff; color:#0c0c0c; font-weight:800; font-size:13px; letter-spacing:-0.03em;">S<span style="color:#E9A84C;">d</span></div>
              <div class="chat-bubble">Hey! I know your project and goals. Ask me anything — stuck on a decision, need advice, or just want to think something through. I am here.</div>
            </div>
          </div>
          <div class="chat-input-area">
            <textarea class="chat-input" spellcheck="false" id="chatInput" placeholder="Ask your coach anything..." onkeydown="handleChatKey(event)"></textarea>
            <button class="chat-send" onclick="sendChat()">↑</button>
          </div>
        </div>
      </div>
    `);
  }

  function handleChatKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChat();
    }
  }

  async function sendChat() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    const messages = document.getElementById('chatMessages');
    messages.innerHTML += `
      <div class="chat-message user">
        <div class="chat-avatar">Y</div>
        <div class="chat-bubble">${msg}</div>
      </div>
      <div class="chat-message" id="typingIndicator">
        <div class="chat-avatar" style="background:#fff; color:#0c0c0c; font-weight:800; font-size:13px; letter-spacing:-0.03em;">S<span style="color:#E9A84C;">d</span></div>
        <div class="chat-bubble" style="color:#444;">Thinking...</div>
      </div>
    `;
    messages.scrollTop = messages.scrollHeight;
    const context = `Project: ${userProfile.project}\nGoal: ${userProfile.goal}`;
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ context, checkin: msg })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error);
      await supabaseClient
        .from('chats')
        .insert([{
          user_id: currentUser.id,
          message: msg,
          response: data.reply
        }]);
      document.getElementById('typingIndicator').outerHTML = `
        <div class="chat-message">
          <div class="chat-avatar" style="background:#fff; color:#0c0c0c; font-weight:800; font-size:13px; letter-spacing:-0.03em;">S<span style="color:#E9A84C;">d</span></div>
          <div class="chat-bubble">${formatResponse(data.reply)}</div>
        </div>
      `;
      messages.scrollTop = messages.scrollHeight;
    } catch(e) {
      document.getElementById('typingIndicator').outerHTML = `
        <div class="chat-message">
          <div class="chat-avatar" style="background:#fff; color:#0c0c0c; font-weight:800; font-size:13px;">Sd</div>
          <div class="chat-bubble" style="color:#c0392b;">Something went wrong. Try again.</div>
        </div>
      `;
    }
  }

  function showProgress() {
    const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const daysHtml = days.map((d, i) => `
      <div class="week-day">
        <div class="week-dot ${i < streak % 7 ? 'done' : i === streak % 7 ? 'today' : ''}"></div>
        <span class="week-day-label">${d}</span>
      </div>
    `).join('');
    render(`
      <div class="progress-screen">
        <span class="screen-tag" style="display:block; margin-bottom:12px;">Progress Tracker</span>
        <h1 style="font-size:42px; font-weight:800; letter-spacing:-0.03em; margin-bottom:32px;">Your progress.</h1>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number">${streak}</div>
            <div class="stat-label">Day Streak</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${streak}</div>
            <div class="stat-label">Total Check-ins</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${streak > 0 ? Math.round((streak / 7) * 100) : 0}%</div>
            <div class="stat-label">This Week</div>
          </div>
        </div>
        <div class="section-block">
          <div class="block-title">This week</div>
          <div class="week-dots">${daysHtml}</div>
        </div>
        <div class="section-block">
          <div class="block-title">Recent check-ins</div>
          <div class="history-item">
            <span class="history-date">Today</span>
            <span class="history-badge">✓ Completed</span>
          </div>
          <div class="history-item">
            <span class="history-date">Yesterday</span>
            <span class="history-badge">✓ Completed</span>
          </div>
          <div class="history-item">
            <span class="history-date">2 days ago</span>
            <span class="history-badge">✓ Completed</span>
          </div>
        </div>
      </div>
    `);
  }

  init();
</script>
</body>
</html>
